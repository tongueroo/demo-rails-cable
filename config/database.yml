default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV["DB_HOST"] || "127.0.0.1" %>
  username: <%= ENV["POSTGRES_USER"] || ENV["DB_USER"] || "postgres" %>
  password: <%= ENV["POSTGRES_PASSWORD"] ||ENV["DB_PASS"] || "postgres" %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>

development:
  primary:
    <<: *default
    database: demo_rails_cable_development
  cache:
    <<: *default
    database: demo_rails_cable_development_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: demo_rails_cable_development_cable
    migrations_paths: db/cable_migrate
  queue:
    <<: *default
    database: demo_rails_cable_development_queue
    migrations_paths: db/queue_migrate

test:
  <<: *default
  database: demo_rails_cable_test

production:
  primary:
    <<: *default
    database: demo_rails_cable_production
  cache:
    <<: *default
    database: demo_rails_cable_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: demo_rails_cable_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: demo_rails_cable_production_cable
    migrations_paths: db/cable_migrate
